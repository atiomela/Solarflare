---
# =============================================================================
# Default variables for the solarflare_update role
# =============================================================================
# Overridable via group_vars / host_vars / extra-vars.

# --- General behaviour --------------------------------------------------------
# Default action assumes the OS / kernel has just been updated by some external
# process (the role does NOT manage OS updates) and the SFC driver — and Onload
# if it was previously installed — must be rebuilt or reinstalled against the
# new running kernel.
solarflare_action: "rebuild"
# rebuild  : rebuild/reinstall driver (and Onload if installed) for running kernel — DEFAULT
# none     : detection only — prints facts and "next manual update" report
# driver   : full driver upgrade (matrix or manual package)
# onload   : full Onload upgrade
# firmware : NIC firmware flash via sfupdate
# both     : driver + firmware
# all      : driver + onload + firmware

# In rebuild mode:
#   - if the installed driver/onload is DKMS-packaged → trigger a rebuild
#     against the running kernel (no new package needed)
#   - else → reinstall the matrix-resolved package for the new kernel
#   - Onload is only touched if it was already installed before the run
#     (controlled by solarflare_rebuild_onload_if_present)
solarflare_rebuild_onload_if_present: true

# If true and a DKMS module status shows "installed" for the running kernel,
# skip the rebuild step (nothing to do). Set to false to force a rebuild.
solarflare_rebuild_skip_if_current: true

solarflare_version_selection: "auto"
# matrix | manual | auto

# When true (default), pre-flight compatibility issues abort the play before
# any module is unloaded. Set to false to demote them to warnings and proceed
# at your own risk (useful when overriding the matrix knowingly).
solarflare_compat_strict: true

solarflare_pin_release: ""           # optional, pin to a `release:` entry name

solarflare_update_all_kernels: false
solarflare_reboot_after_driver: false
solarflare_reboot_timeout: 600

# --- Workspace ---------------------------------------------------------------
solarflare_tmp_dir: "/tmp/solarflare_update"
solarflare_backup_dir: "{{ solarflare_tmp_dir }}/backup"

# --- MANUAL OVERRIDES (used in manual / auto modes) --------------------------
solarflare_driver_pkg_src: ""
solarflare_driver_pkg_url: ""
solarflare_onload_pkg_src: ""
solarflare_onload_pkg_url: ""
solarflare_firmware_image: ""
solarflare_firmware_force: false
solarflare_firmware_post_wait: 30

solarflare_sfupdate_bin: "/usr/sbin/sfupdate"

# --- HTTP package repository ------------------------------------------------
# All driver / onload / firmware artefacts live on one internal HTTP server,
# protected by HTTP Basic auth, laid out FLAT: one directory per OS, all the
# packages for that OS in that directory.
#
#   {base_url}/{os_dir}/<all package files>
#
# Where {os_dir} is solarflare_repo_os_dir, computed per host (default below).
solarflare_repo_base_url: "https://repo.example.local/solarflare"
solarflare_repo_user: ""                     # set in vault
solarflare_repo_pass: ""                     # set in vault
solarflare_repo_validate_certs: true
solarflare_repo_force_basic_auth: true

# Per-host directory under the base URL. Override in group_vars/ to match
# however your tree is named (e.g. "rhel8", "ubuntu-22.04", "debian/12", ...).
# The default uses the distribution name + major version, lowercased.
solarflare_repo_os_dir: >-
  {{ (ansible_distribution ~ ansible_distribution_major_version) | lower }}

# Auto-detect the Onload package SET from the matrix entry's `pkg:` filename.
# The role splits the filename's base name (everything before the version)
# and probes the repo for conventional siblings: onload-kmod, onload-devel
# (RHEL), onload-dkms, onload-dev (Debian). A 404 / missing file means
# "not present in your repo" → skipped silently. Disable by setting this
# to false and supplying explicit kmod_pkg/devel_pkg fields in the matrix.
solarflare_onload_autodetect_set: true

# Sibling-name suffixes probed during auto-detect. Keyed by OS family.
# Override in group_vars to add more (e.g. -profiles, -tools).
solarflare_onload_sibling_suffixes:
  RedHat:
    - { name: "onload-kmod",   required: true  }
    - { name: "onload-devel",  required: false }
  Debian:
    - { name: "onload-dkms",   required: true  }
    - { name: "onload-dev",    required: false }

# --- Modules / services ------------------------------------------------------
solarflare_modules:
  - onload
  - onload_cplane
  - sfc_char
  - sfc_resource
  - sfc_affinity
  - sfc_tune
  - sfc_control
  - virtual_bus
  - sfc

solarflare_services:
  - openonload
  - onload
  - sfptpd
  - sfc

# =============================================================================
# COMPATIBILITY MATRIX
# =============================================================================
# First entry matching ALL of these wins:
#   - os_family                  vs ansible_os_family    (required)
#   - distribution               vs ansible_distribution (optional; Ubuntu vs Debian)
#   - distribution_major_version vs ansible_distribution_major_version (optional)
#   - kernel_regex               vs ansible_kernel       (required)
#
# IMPORTANT
#   - Version strings below are PLACEHOLDERS based on Solarflare/Xilinx/AMD
#     public release lineage. Verify with the vendor's compatibility matrix
#     before deploying — newer firmware may not support older NICs.
#   - RHEL 6 / Ubuntu 16.04 / Debian 10 / Debian 11 are EOL or extended-support.
#     Onload 8.x dropped support for very old kernels; use Onload 7.x there.
#   - `source` URLs point operators to the right download page for the next
#     manual refresh.

