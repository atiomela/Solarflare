      version: "4.15.6.1015"            # last sfc series supporting 2.6.32
      pkg: "kernel-module-sfc-RHEL6-4.15.6.1015-1.x86_64.rpm"
      url: ""
      source: "https://www.xilinx.com/support/download/nic-software-and-drivers.html"
    firmware:
      version: "6.2.7.1001"
      image: "/opt/sf/firmware/SFA-bundle-6.2.7.1001.dat"
      source: "https://www.xilinx.com/support/download/nic-firmware.html"
    onload:
      version: "7.1.3.202"               # Onload 7 line — last to support EL6
      pkg: "onload-7.1.3.202-1.x86_64.rpm"
      kmod_pkg: "onload-kmod-7.1.3.202-1.x86_64.rpm"
      devel_pkg: "onload-devel-7.1.3.202-1.x86_64.rpm"
